name: CI

on:
  push:
    branches:
      - master
    paths:
      - 'app/**'
      - 'tests/**'
      - 'migrations/**'
      - 'Dockerfile'
      - 'pyproject.toml'
      - 'uv.lock'
      - 'docker-compose.yml'
      - 'docker-compose.test.yml'
      - 'Makefile'
      - '.github/workflows/ci.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: false

jobs:
  ci:
    name: CI
    runs-on: self-hosted
    if: github.actor != 'github-actions[bot]'
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Setup
        run: make ci-setup

      - name: Lint
        run: make lint

      - name: Test
        run: |
          cp .env.test.example .env.test
          make test

      - name: Set image tag
        id: meta
        run: echo "tag=${GITHUB_SHA::12}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        env:
          IMAGE_REF: ghcr.io/gotenksin/rest-api
          IMAGE_TAG: ${{ steps.meta.outputs.tag }}
        run: make ci-build
