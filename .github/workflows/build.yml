name: Build api

on:
  push:
    branches:
      - "master"
  workflow_dispatch:

jobs:
  build:

    runs-on: self-hosted

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v7
      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0
      - name: Set up Python
        run: uv python install
      - name: Install dependencies
        run: uv sync --frozen
      - name: Run linter
        run: make lint
      - name: Run tests
        run: make test
      - name: Log in to GitHub Container Registry (GHCR)
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Docker build
        run: make docker-build
      - name: Docker tag and push to GHCR
        run: |
          VERSION=$(grep -m 1 "version =" pyproject.toml | cut -d '"' -f 2)
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          REGISTRY_IMAGE="ghcr.io/$OWNER/rest-api"
          
          docker tag rest-api:$VERSION $REGISTRY_IMAGE:$VERSION
          docker tag rest-api:$VERSION $REGISTRY_IMAGE:latest
          
          docker push $REGISTRY_IMAGE:$VERSION
          docker push $REGISTRY_IMAGE:latest
