name: Update Helm Image Tag

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: update-helm-image-${{ github.ref }}
  cancel-in-progress: false

jobs:
  update-image-tag:
    name: Update Helm image tag
    runs-on: self-hosted
    if: >
      github.event.workflow_run.conclusion == 'success'
      || github.event_name == 'workflow_dispatch'
    permissions:
      contents: write
    steps:
      - name: Compute image tag
        id: meta
        run: |
          sha="${{ github.event.workflow_run.head_sha }}"
          if [ -z "$sha" ]; then
            sha="$GITHUB_SHA"
          fi
          echo "tag=${sha:0:12}" >> "$GITHUB_OUTPUT"

      - name: Skip if tag is already current
        env:
          GH_TOKEN: ${{ github.token }}
          IMAGE_TAG: ${{ steps.meta.outputs.tag }}
          VALUES_PATH: repos/${{ github.repository }}/contents/helm/stack/values.yaml?ref=master
        run: |
          current_tag=$(gh api "$VALUES_PATH" \
            --jq '.content' | base64 -d | grep '^  tag: ' | awk '{print $2}')
          if [ "$current_tag" = "$IMAGE_TAG" ]; then
            echo "Helm image tag is already ${IMAGE_TAG}, skipping"
            exit 0
          fi
          echo "Current tag: ${current_tag}, new tag: ${IMAGE_TAG}"

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install Python
        run: uv python install 3.14

      - name: Update Helm image tag
        env:
          IMAGE_TAG: ${{ steps.meta.outputs.tag }}
        run: |
          git pull --rebase origin master
          uv run --with pyyaml python -c '
          import os, yaml
          from pathlib import Path
          tag = os.environ["IMAGE_TAG"]
          path = Path("helm/stack/values.yaml")
          data = yaml.safe_load(path.read_text())
          data["image"]["tag"] = tag
          path.write_text(
              yaml.dump(data, default_flow_style=False, sort_keys=False)
          )
          '

      - name: Commit Helm image tag
        env:
          GH_TOKEN: ${{ github.token }}
          IMAGE_TAG: ${{ steps.meta.outputs.tag }}
          VALUES_PATH: repos/${{ github.repository }}/contents/helm/stack/values.yaml?ref=master
        run: |
          if git diff --quiet -- helm/stack/values.yaml; then
            echo "Helm image tag is already ${IMAGE_TAG}"
            exit 0
          fi

          file_sha=$(gh api "$VALUES_PATH" --jq .sha)
          content=$(base64 < helm/stack/values.yaml | tr -d '\n')

          gh api \
            --method PUT \
            "repos/${GITHUB_REPOSITORY}/contents/helm/stack/values.yaml" \
            -f branch=master \
            -f message="chore: deploy image ${IMAGE_TAG}" \
            -f content="${content}" \
            -f sha="${file_sha}"
