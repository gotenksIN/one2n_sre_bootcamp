name: ArgoCD Image Update

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: argocd-image-update-${{ github.ref }}
  cancel-in-progress: false

jobs:
  update-helm-image:
    name: Deploy image via ArgoCD
    runs-on: self-hosted
    if: github.actor != 'github-actions[bot]'
    permissions:
      contents: write
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0

      - name: Check runner tools
        run: |
          docker --version
          docker compose version
          docker buildx version
          gh --version

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install Python
        run: uv python install 3.14

      - name: Install dependencies
        run: uv sync --frozen

      - name: Lint
        run: uv run ruff check .

      - name: Test
        run: |
          cp .env.test.example .env.test
          make test

      - name: Set image tag
        id: meta
        run: echo "tag=${GITHUB_SHA::12}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ghcr.io/gotenksin/rest-api:${{ steps.meta.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Update Helm image tag
        env:
          IMAGE_TAG: ${{ steps.meta.outputs.tag }}
        run: |
          git pull --rebase origin master
          uv run --with pyyaml python - <<'PY'
          import os
          from pathlib import Path

          import yaml

          tag = os.environ["IMAGE_TAG"]
          path = Path("helm/stack/values.yaml")

          data = yaml.safe_load(path.read_text())
          data["image"]["tag"] = tag

          path.write_text(yaml.dump(data, default_flow_style=False, sort_keys=False))
          PY

      - name: Commit Helm image tag
        env:
          GH_TOKEN: ${{ github.token }}
          IMAGE_TAG: ${{ steps.meta.outputs.tag }}
        run: |
          if git diff --quiet -- helm/stack/values.yaml; then
            echo "Helm image tag is already ${IMAGE_TAG}"
            exit 0
          fi

          file_sha=$(gh api \
            "repos/${GITHUB_REPOSITORY}/contents/helm/stack/values.yaml?ref=master" \
            --jq .sha)
          content=$(base64 < helm/stack/values.yaml | tr -d '\n')

          gh api \
            --method PUT \
            "repos/${GITHUB_REPOSITORY}/contents/helm/stack/values.yaml" \
            -f branch=master \
            -f message="chore: deploy image ${IMAGE_TAG}" \
            -f content="${content}" \
            -f sha="${file_sha}"
