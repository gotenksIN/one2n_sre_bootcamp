apiVersion: v1
kind: Namespace
metadata:
  name: student-api
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: student-api-config
  namespace: student-api
data:
  FLASK_DEBUG: "0"
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: student-api-secret
  namespace: student-api
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-secret-store
    kind: SecretStore
  target:
    name: student-api-secret
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        SECRET_KEY: "{{ .secret_key }}"
        DATABASE_URL: "postgresql://postgres:{{ .postgres_password }}@postgres:5432/students_api"
  data:
    - secretKey: postgres_password
      remoteRef:
        key: student-api
        property: postgres-password
    - secretKey: secret_key
      remoteRef:
        key: student-api
        property: secret-key
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: student-api
  namespace: student-api
  labels:
    app: student-api
spec:
  replicas: 1
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: student-api
  template:
    metadata:
      labels:
        app: student-api
    spec:
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              preference:
                matchExpressions:
                  - key: student-api/node-role
                    operator: In
                    values:
                      - application
      initContainers:
        - name: wait-for-postgres
          image: postgres:18-alpine
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - until pg_isready -h postgres -p 5432; do echo waiting for postgres; sleep 2; done
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
        - name: db-migrate
          image: ${IMAGE}
          imagePullPolicy: IfNotPresent
          command:
            - flask
            - --app
            - app.main:app
            - db
            - upgrade
          envFrom:
            - configMapRef:
                name: student-api-config
            - secretRef:
                name: student-api-secret
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
      containers:
        - name: student-api
          image: ${IMAGE}
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 5000
          envFrom:
            - configMapRef:
                name: student-api-config
            - secretRef:
                name: student-api-secret
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /api/v1/healthcheck
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/v1/healthcheck
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: student-api
  namespace: student-api
  labels:
    app: student-api
spec:
  type: NodePort
  selector:
    app: student-api
  ports:
    - name: http
      port: 5000
      targetPort: http
      nodePort: 30080
