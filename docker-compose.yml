services:
  postgres:
    image: postgres:18-alpine
    env_file:
      - .env
    volumes:
      - postgres-data:/var/lib/postgresql
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U "$${POSTGRES_USER}" -d "$${POSTGRES_DB}"
      interval: 5s
      timeout: 5s
      retries: 12

  migrate:
    build: .
    image: rest-api:${VERSION:-latest}
    command: flask db upgrade
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env

  rest-api:
    build: .
    image: rest-api:${VERSION:-latest}
    ports:
      - "5000:5000"
    depends_on:
      migrate:
        condition: service_completed_successfully
    env_file:
      - .env
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - import urllib.request; urllib.request.urlopen('http://localhost:5000/health')
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  postgres-data:
