services:
  db:
    image: postgres:18-alpine
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: secure_password
      POSTGRES_DB: students_api
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d students_api"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  migrate:
    build:
      context: ..
      dockerfile: Dockerfile
    command: flask db upgrade
    depends_on:
      db:
        condition: service_healthy
    env_file: .env
    restart: "no"
    networks:
      - app-network

  api-1: &api
    build:
      context: ..
      dockerfile: Dockerfile
    restart: always
    depends_on:
      migrate:
        condition: service_completed_successfully
    env_file: .env
    networks:
      - app-network

  api-2:
    <<: *api

  nginx:
    image: nginx:alpine
    ports:
      - "8080:8080"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api-1
      - api-2
    restart: always
    networks:
      - app-network

volumes:
  pg-data:

networks:
  app-network:
    driver: bridge
