apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "api.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "api.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  revisionHistoryLimit: {{ .Values.revisionHistoryLimit }}
  selector:
    matchLabels:
      {{- include "api.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "api.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "api.fullname" . }}
      {{- if .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml .Values.imagePullSecrets | nindent 8 }}
      {{- end }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if .Values.nodeAffinity.enabled }}
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: {{ .Values.nodeAffinity.key }}
                    operator: In
                    values:
                      - {{ .Values.nodeAffinity.value }}
      {{- end }}
      initContainers:
        {{- if .Values.waitForPostgres.enabled }}
        - name: wait-for-postgres
          image: {{ .Values.waitForPostgres.image.repository }}:{{ .Values.waitForPostgres.image.tag }}
          imagePullPolicy: {{ .Values.waitForPostgres.image.pullPolicy }}
          command:
            - sh
            - -c
            - until pg_isready -h {{ .Values.config.databaseHost }} -p {{ .Values.config.databasePort }} -d {{ .Values.config.databaseName }} -U {{ .Values.config.databaseUser }}; do echo waiting for postgres; sleep 2; done
          resources:
            {{- toYaml .Values.waitForPostgresResources | nindent 12 }}
        {{- end }}
        {{- if .Values.migration.enabled }}
        - name: db-migrate
          image: {{ include "api.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - flask
            - --app
            - app.main:app
            - db
            - upgrade
          envFrom:
            - secretRef:
                name: {{ include "api.fullname" . }}
            - configMapRef:
                name: {{ include "api.fullname" . }}-config
          resources:
            {{- toYaml .Values.migrationResources | nindent 12 }}
        {{- end }}
      containers:
        - name: {{ include "api.name" . }}
          image: {{ include "api.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
          command:
            - gunicorn
            - app.main:app
            - --bind
            - 0.0.0.0:{{ .Values.service.port }}
            - --access-logfile
            - '-'
            - --error-logfile
            - '-'
          envFrom:
            - secretRef:
                name: {{ include "api.fullname" . }}
            - configMapRef:
                name: {{ include "api.fullname" . }}-config
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          {{- with .Values.containerSecurityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- if .Values.startupProbe.enabled }}
          startupProbe:
            httpGet:
              path: {{ .Values.startupProbe.path }}
              port: http
            initialDelaySeconds: {{ .Values.startupProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.startupProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.startupProbe.timeoutSeconds }}
            failureThreshold: {{ .Values.startupProbe.failureThreshold }}
          {{- end }}
          readinessProbe:
            httpGet:
              path: {{ .Values.readinessProbe.path }}
              port: http
            initialDelaySeconds: {{ .Values.readinessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.readinessProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.readinessProbe.timeoutSeconds }}
            failureThreshold: {{ .Values.readinessProbe.failureThreshold }}
          livenessProbe:
            httpGet:
              path: {{ .Values.livenessProbe.path }}
              port: http
            initialDelaySeconds: {{ .Values.livenessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.livenessProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.livenessProbe.timeoutSeconds }}
            failureThreshold: {{ .Values.livenessProbe.failureThreshold }}
