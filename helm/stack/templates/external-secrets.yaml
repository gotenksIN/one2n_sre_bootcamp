apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: {{ .Values.externalSecrets.storeName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "api.labels" . | nindent 4 }}
spec:
  provider:
    vault:
      server: {{ .Values.externalSecrets.vault.server | quote }}
      path: {{ .Values.externalSecrets.vault.path | quote }}
      version: {{ .Values.externalSecrets.vault.version | quote }}
      auth:
        kubernetes:
          mountPath: kubernetes
          role: {{ .Values.externalSecrets.vault.role | quote }}
          serviceAccountRef:
            name: {{ .Values.externalSecrets.serviceAccountName }}
            audiences:
              - vault
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ .Release.Name }}-postgresql
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: postgresql
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  refreshInterval: {{ .Values.externalSecrets.refreshInterval }}
  secretStoreRef:
    name: {{ .Values.externalSecrets.storeName }}
    kind: SecretStore
  target:
    name: {{ .Release.Name }}-postgresql
    creationPolicy: Owner
  data:
    - secretKey: password
      remoteRef:
        key: {{ .Values.externalSecrets.vault.secretKey }}
        property: postgresPassword
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ include "api.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "api.labels" . | nindent 4 }}
spec:
  refreshInterval: {{ .Values.externalSecrets.refreshInterval }}
  secretStoreRef:
    name: {{ .Values.externalSecrets.storeName }}
    kind: SecretStore
  target:
    name: {{ include "api.fullname" . }}
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        DATABASE_URL: {{ printf "postgresql://%s:{{ .postgresPassword }}@%s:%s/%s" .Values.config.databaseUser .Values.config.databaseHost .Values.config.databasePort .Values.config.databaseName | quote }}
        SECRET_KEY: {{ "{{ .secretKey }}" | quote }}
  data:
    - secretKey: postgresPassword
      remoteRef:
        key: {{ .Values.externalSecrets.vault.secretKey }}
        property: postgresPassword
    - secretKey: secretKey
      remoteRef:
        key: {{ .Values.externalSecrets.vault.secretKey }}
        property: secretKey
