namespaces:
  vault: vault

replicaCount: 1
revisionHistoryLimit: 3

image:
  repository: rest-api
  tag: "0.1.0"
  pullPolicy: IfNotPresent

service:
  type: NodePort
  port: 5000
  nodePort: 30080

config:
  flaskDebug: "0"
  databaseHost: stack-postgresql
  databasePort: "5432"
  databaseName: app
  databaseUser: app

vaultInjector:
  enabled: true
  role: app
  secretPath: secret
  secretSubPath: app

migration:
  enabled: true

waitForPostgres:
  enabled: true
  image:
    repository: postgres
    tag: 18-alpine
    pullPolicy: IfNotPresent

nodeAffinity:
  enabled: true
  key: app/node-role
  value: application

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

migrationResources:
  requests:
    cpu: 50m
    memory: 128Mi
  limits:
    cpu: 250m
    memory: 256Mi

waitForPostgresResources:
  requests:
    cpu: 25m
    memory: 32Mi
  limits:
    cpu: 100m
    memory: 64Mi

readinessProbe:
  path: /api/v1/healthcheck
  initialDelaySeconds: 5
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

livenessProbe:
  path: /api/v1/healthcheck
  initialDelaySeconds: 20
  periodSeconds: 20
  timeoutSeconds: 5
  failureThreshold: 3

vaultBootstrap:
  enabled: true
  image:
    repository: hashicorp/vault
    tag: "1.20"
    pullPolicy: IfNotPresent
  serviceAccountName: vault-bootstrap
  vaultAddress: http://stack-vault.vault.svc.cluster.local:8200
  rootToken: root
  secretPath: secret
  secretSubPath: app
  postgresPassword: change-me
  flaskSecretKey: change-me
  policyName: app
  kubernetesRole: app
  apiServiceAccount: stack
  vaultAudience: vault
  activeDeadlineSeconds: 180
  ttlSecondsAfterFinished: 600
  vaultStatusRetries: 60
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 250m
      memory: 256Mi

vault:
  enabled: true
  global:
    namespace: vault
  injector:
    enabled: true
  server:
    dev:
      enabled: true
      devRootToken: root
    affinity: |
      nodeAffinity:
        preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            preference:
              matchExpressions:
                - key: app/node-role
                  operator: In
                  values:
                    - dependent-services
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 512Mi
  ui:
    enabled: true

postgresql:
  image:
    repository: postgres
    tag: "18-alpine"
    pullPolicy: IfNotPresent
  auth:
    username: app
    database: app
  persistence:
    size: 1Gi
  nodeAffinity:
    enabled: true
    key: app/node-role
    value: database
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
