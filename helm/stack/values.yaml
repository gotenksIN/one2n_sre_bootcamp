namespaces:
  vault: vault
replicaCount: 1
revisionHistoryLimit: 3
image:
  repository: ghcr.io/gotenksin/rest-api
  tag: eb62c8f3a70e
  pullPolicy: Always
imagePullSecrets: []
service:
  type: NodePort
  port: 5000
  nodePort: 30080
config:
  flaskDebug: '0'
  databaseHost: stack-postgresql
  databasePort: '5432'
  databaseName: app
  databaseUser: app
vaultInjector:
  enabled: true
  role: app
  secretPath: secret
  secretSubPath: app
migration:
  enabled: true
waitForPostgres:
  enabled: true
  image:
    repository: postgres
    tag: 18-alpine
    pullPolicy: IfNotPresent
vaultSecretWaitTimeout: 120
nodeAffinity:
  enabled: true
  key: type
  value: application
resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi
migrationResources:
  requests:
    cpu: 50m
    memory: 128Mi
  limits:
    cpu: 250m
    memory: 256Mi
waitForPostgresResources:
  requests:
    cpu: 25m
    memory: 32Mi
  limits:
    cpu: 100m
    memory: 64Mi
startupProbe:
  enabled: true
  path: /health
  initialDelaySeconds: 0
  periodSeconds: 5
  timeoutSeconds: 5
  failureThreshold: 24
readinessProbe:
  path: /readyz
  initialDelaySeconds: 5
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3
livenessProbe:
  path: /livez
  initialDelaySeconds: 20
  periodSeconds: 20
  timeoutSeconds: 5
  failureThreshold: 3
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 10001
  runAsGroup: 10001
  fsGroup: 10001
  seccompProfile:
    type: RuntimeDefault
containerSecurityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false
  capabilities:
    drop:
    - ALL
vaultBootstrap:
  enabled: true
  image:
    repository: hashicorp/vault
    tag: '1.20'
    pullPolicy: IfNotPresent
  serviceAccountName: vault-bootstrap
  vaultAddress: http://stack-vault.vault.svc.cluster.local:8200
  rootToken: root
  secretPath: secret
  secretSubPath: app
  postgresPassword: change-me
  flaskSecretKey: change-me
  policyName: app
  kubernetesRole: app
  apiServiceAccount: stack
  activeDeadlineSeconds: 180
  ttlSecondsAfterFinished: 600
  vaultStatusRetries: 60
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 250m
      memory: 256Mi
vault:
  enabled: true
  global:
    namespace: vault
  injector:
    enabled: true
  server:
    dev:
      enabled: true
      devRootToken: root
    affinity: "nodeAffinity:\n  preferredDuringSchedulingIgnoredDuringExecution:\n\
      \    - weight: 100\n      preference:\n        matchExpressions:\n         \
      \ - key: type\n            operator: In\n            values:\n    \
      \          - dependent_services\n"
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 512Mi
  ui:
    enabled: true
postgresql:
  image:
    repository: postgres
    tag: 18-alpine
    pullPolicy: IfNotPresent
  auth:
    username: app
    database: app
  persistence:
    size: 1Gi
  nodeAffinity:
    enabled: true
    key: type
    value: database
  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 70
    runAsGroup: 70
    fsGroup: 70
    seccompProfile:
      type: RuntimeDefault
  containerSecurityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: false
    capabilities:
      drop:
      - ALL
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
podDisruptionBudget:
  enabled: true
  minAvailable: 1
networkPolicy:
  enabled: true
