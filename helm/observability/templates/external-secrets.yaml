apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: {{ .Values.externalSecrets.storeName }}
  namespace: {{ .Release.Namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
  labels:
    {{- include "observability.labels" . | nindent 4 }}
spec:
  provider:
    vault:
      server: {{ .Values.externalSecrets.vault.server }}
      path: {{ .Values.externalSecrets.vault.path }}
      version: {{ .Values.externalSecrets.vault.version }}
      auth:
        kubernetes:
          mountPath: kubernetes
          role: {{ .Values.externalSecrets.vault.role }}
          serviceAccountRef:
            name: {{ .Values.externalSecrets.serviceAccountName }}
            audiences:
              - vault
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ .Release.Name }}-postgres-admin
  namespace: {{ .Release.Namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
  labels:
    {{- include "observability.labels" . | nindent 4 }}
spec:
  refreshInterval: {{ .Values.externalSecrets.refreshInterval }}
  secretStoreRef:
    name: {{ .Values.externalSecrets.storeName }}
    kind: SecretStore
  target:
    name: postgres-admin-credentials
    creationPolicy: Owner
  data:
    - secretKey: password
      remoteRef:
        key: {{ .Values.externalSecrets.vault.applicationSecretKey }}
        property: postgresPassword
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ .Release.Name }}-postgres-exporter
  namespace: {{ .Release.Namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
    force-sync: {{ index .Values "postgres-exporter" "annotations" "observability.stack/bootstrap-revision" | quote }}
  labels:
    {{- include "observability.labels" . | nindent 4 }}
spec:
  refreshInterval: {{ .Values.externalSecrets.refreshInterval }}
  secretStoreRef:
    name: {{ .Values.externalSecrets.storeName }}
    kind: SecretStore
  target:
    name: postgres-exporter-credentials
    creationPolicy: Owner
    template:
      data:
        password: "{{ `{{ .password }}` }}"
        bootstrap-revision: {{ index .Values "postgres-exporter" "annotations" "observability.stack/bootstrap-revision" | quote }}
  data:
    - secretKey: password
      remoteRef:
        key: {{ .Values.externalSecrets.vault.observabilitySecretKey }}
        property: postgresExporterPassword
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ .Release.Name }}-grafana-admin
  namespace: {{ .Release.Namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
  labels:
    {{- include "observability.labels" . | nindent 4 }}
spec:
  refreshInterval: {{ .Values.externalSecrets.refreshInterval }}
  secretStoreRef:
    name: {{ .Values.externalSecrets.storeName }}
    kind: SecretStore
  target:
    name: grafana-admin-credentials
    creationPolicy: Owner
  data:
    - secretKey: admin-user
      remoteRef:
        key: {{ .Values.externalSecrets.vault.observabilitySecretKey }}
        property: grafanaAdminUser
    - secretKey: admin-password
      remoteRef:
        key: {{ .Values.externalSecrets.vault.observabilitySecretKey }}
        property: grafanaAdminPassword
